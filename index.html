<script>
// ═══════════════════════════════════════════════════════════════════════════════
// PASSWORD HASHING & AUTHENTICATION
// ═══════════════════════════════════════════════════════════════════════════════
const ACCESS_HASH = '58fe70865b9acd74e1d7e76c040c29953d0809162e906a9900b82d43da93ab8d';
const RESET_HASH  = '71a1c15bbca3050ffce2b5853199ba456fa9d5da6832dc19ec41c1910158f8ec';

async function sha256(str){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

let authenticated = false;

// Check if remembered
try { if(localStorage.getItem('school-cal-auth')==='1') authenticated = true; } catch(e){}

function renderGate(){
  const app = document.getElementById('app');
  app.innerHTML = '';
  const box = document.createElement('div');
  box.className = 'gate';
  box.innerHTML = `
    <div class="gate-box">
      <div class="gate-icon">📅🔒</div>
      <div class="gate-title">School Calendar</div>
      <div class="gate-sub">Calendrier scolaire 2025–2026</div>
      <input type="password" class="gate-input" id="gate-pw" placeholder="Password / Mot de passe" autocomplete="off">
      <button class="gate-btn" id="gate-go">Enter / Entrer</button>
